name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # for posting coverage comments on PRs

jobs:
  # ---------------------------------------------------------------------------
  # Python: lint + test with coverage
  # ---------------------------------------------------------------------------
  python-test:
    name: "Python – lint & test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: m365

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "m365/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install "ruff>=0.4,<1.0"
          ruff check agent/ tests/
          ruff format --check agent/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=agent \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: m365/coverage.xml

  # ---------------------------------------------------------------------------
  # Docker: build image (no push on PRs)
  # ---------------------------------------------------------------------------
  docker-build:
    name: "Docker – build"
    runs-on: ubuntu-latest
    needs: python-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: m365/
          file: m365/Dockerfile
          push: false
          tags: m365-security-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Terraform: format check + validate (no plan/apply)
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: "Terraform – fmt & validate"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (local, no backend)
        run: |
          terraform init \
            -backend=false \
            -input=false

      - name: Terraform Validate
        run: terraform validate

      # Run unit tests using mock providers (no Azure credentials needed)
      - name: Terraform Test (unit tests with mock_provider)
        run: terraform test -test-directory=tests/
