name: CD

on:
  push:
    branches: ["main"]

# Only one deployment runs at a time per environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC token for Azure login
  contents: read

# ---------------------------------------------------------------------------
# Environment-level secrets expected:
#
#   AZURE_CLIENT_ID          – service principal / federated credential client ID
#   AZURE_TENANT_ID          – Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID    – target subscription
#   TF_STATE_RESOURCE_GROUP  – resource group holding the Terraform state SA
#   TF_STATE_STORAGE_ACCOUNT – storage account name for TF state
#   TF_STATE_CONTAINER       – blob container name
#   TF_STATE_KEY             – blob key (e.g. m365-security-agent.tfstate)
#   M365_CLIENT_ID           – Entra app registration client ID for the agent
#   M365_CLIENT_SECRET       – app registration client secret
#   FOUNDRY_API_KEY          – Azure OpenAI / Foundry API key
# ---------------------------------------------------------------------------

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Python tests (must pass before deploying)
  # ---------------------------------------------------------------------------
  python-test:
    name: "Python – tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: m365

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "m365/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ --tb=short -q

  # ---------------------------------------------------------------------------
  # 2. Build and push Docker image to ACR
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: "Docker – build & push"
    runs-on: ubuntu-latest
    needs: python-test
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr list \
            --resource-group "rg-${{ vars.TF_PREFIX }}-${{ vars.TF_ENVIRONMENT }}" \
            --query "[0].loginServer" -o tsv)
          echo "login_server=${LOGIN_SERVER}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        run: az acr login --name "${{ steps.acr.outputs.login_server }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr.outputs.login_server }}/m365-security-agent
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: m365/
          file: m365/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3. Terraform plan
  # ---------------------------------------------------------------------------
  terraform-plan:
    name: "Terraform – plan"
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: plan

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="m365_client_id=${{ secrets.M365_CLIENT_ID }}" \
            -var="m365_client_secret=${{ secrets.M365_CLIENT_SECRET }}" \
            -var="foundry_api_key=${{ secrets.FOUNDRY_API_KEY }}" \
            -var="agent_image_tag=${{ needs.docker-build-push.outputs.image_tag }}" \
            -var="prefix=${{ vars.TF_PREFIX }}" \
            -var="environment=${{ vars.TF_ENVIRONMENT }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 4. Terraform apply (requires approval via GitHub Environments)
  # ---------------------------------------------------------------------------
  terraform-apply:
    name: "Terraform – apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production   # configure required reviewers in repo settings

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
